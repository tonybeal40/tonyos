<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tier A Accounts - Tony CRM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
    }
    a { color: #00ff88; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .nav { margin-bottom: 1.5rem; display: flex; gap: 1rem; }
    h1 { color: #00ff88; font-size: 1.8rem; margin-bottom: 0.5rem; }
    .subtitle { color: #888; margin-bottom: 2rem; }
    .account-table {
      width: 100%;
      border-collapse: collapse;
      background: #1a1a24;
      border-radius: 8px;
      overflow: hidden;
    }
    .account-table th, .account-table td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid #333;
    }
    .account-table th {
      background: #0a0a0f;
      color: #00ff88;
      font-size: 0.85rem;
      text-transform: uppercase;
    }
    .account-table tr:hover { background: #252530; }
    .tier-badge {
      display: inline-block;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.85rem;
      background: #00ff88;
      color: #0a0a0f;
    }
    .division {
      color: #00aaff;
      font-size: 0.9rem;
    }
    .score {
      font-weight: 600;
      color: #ffd700;
    }
    .empty {
      text-align: center;
      padding: 3rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="nav">
    <a href="index.html">&larr; Accounts</a>
    <a href="dashboard.html">Dashboard</a>
  </div>
  <h1>Tier A Accounts</h1>
  <p class="subtitle">High-priority accounts with strong persona fit and primary market alignment</p>

  <table class="account-table" id="accounts">
    <thead>
      <tr>
        <th>Company</th>
        <th>Industry</th>
        <th>Division</th>
        <th>Persona Score</th>
        <th>Tier</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="6" class="empty">Loading...</td></tr>
    </tbody>
  </table>

  <script>
    async function load() {
      try {
        const res = await fetch('/api/accounts');
        const data = await res.json();
        const tierA = (data.accounts || []).filter(a => a.tier === 'A');
        
        if (tierA.length === 0) {
          document.getElementById('tbody').innerHTML = '<tr><td colspan="6" class="empty">No Tier A accounts yet.</td></tr>';
          return;
        }

        document.getElementById('tbody').innerHTML = tierA.map(a => `
          <tr>
            <td><a href="account.html?id=${a.id}">${a.company_name}</a></td>
            <td>${a.industry || '-'}</td>
            <td class="division">${a.division_fit || '-'}</td>
            <td class="score">${a.persona_score || 0}</td>
            <td><span class="tier-badge">${a.tier}</span></td>
            <td>${a.status || 'New'}</td>
          </tr>
        `).join('');
      } catch (e) {
        document.getElementById('tbody').innerHTML = '<tr><td colspan="6" class="empty">Failed to load accounts.</td></tr>';
      }
    }
    load();
  </script>
</body>
</html>
