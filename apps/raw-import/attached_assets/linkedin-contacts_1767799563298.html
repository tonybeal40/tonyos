<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LinkedIn Contacts – Natoli Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      padding: 24px 16px 48px;
      background: radial-gradient(circle at top, #1f2937 0, #020617 46%);
      color: #f4f7ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .shell {
      max-width: 1180px;
      margin: 0 auto;
    }
    h1 {
      font-size: 26px;
      margin-bottom: 8px;
    }
    p {
      font-size: 13px;
      color: #c0c7dd;
      margin-bottom: 14px;
    }
    a.back {
      display: inline-block;
      margin-bottom: 14px;
      font-size: 13px;
      color: #93c5fd;
      text-decoration: none;
    }
    a.back:hover { text-decoration: underline; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      background: rgba(6, 11, 25, 0.95);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.55);
      border-radius: 16px;
      overflow: hidden;
    }
    thead {
      background: #020617;
    }
    th, td {
      padding: 8px 10px;
      border-bottom: 1px solid #111827;
      text-align: left;
    }
    th {
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 11px;
      color: #8c93aa;
    }
    tbody tr:nth-child(even) {
      background: rgba(15, 23, 42, 0.7);
    }
    tbody tr:last-child td {
      border-bottom: none;
    }
    a.profile-link {
      color: #93c5fd;
      text-decoration: none;
    }
    a.profile-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="shell">
    <a href="index.html" class="back">← Back to main dashboard</a>
    <h1>LinkedIn Contact Table</h1>
    <p>
      This table is built directly from <strong>linkedin-tier-connections.csv</strong> using the same file that
      powers the relationship value estimate on the dashboard.
    </p>

    <table>
      <thead id="contacts-head"></thead>
      <tbody id="contacts-body">
        <tr><td>Loading contacts…</td></tr>
      </tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
