<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TonyOS Simple Chat</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      color: #e2e8f0;
    }
    h1 {
      color: #f472b6;
      margin-bottom: 24px;
    }
    textarea {
      width: 100%;
      height: 120px;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: #1e293b;
      color: #e2e8f0;
      font-size: 16px;
      resize: vertical;
    }
    textarea:focus {
      outline: none;
      border-color: #e11d48;
    }
    button {
      padding: 12px 24px;
      margin-top: 12px;
      background: linear-gradient(135deg, #e11d48, #be185d);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    h3 {
      color: #94a3b8;
      margin-top: 24px;
    }
    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      min-height: 100px;
      line-height: 1.6;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      color: #94a3b8;
      text-decoration: none;
    }
    .back-link:hover {
      color: #f472b6;
    }
  </style>
</head>
<body>
  <a href="/" class="back-link">← Back to TonyOS</a>
  <h1>Simple Chat</h1>

  <textarea id="msg" placeholder="Type your message..."></textarea>
  <br/>
  <button id="send">Send Message</button>

  <h3>Response</h3>
  <pre id="out">Your response will appear here...</pre>

  <script src="app.js"></script>
</body>
</html>
