<!DOCTYPE html>
<html>
<head>
  <title>Revenue Command Center</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; padding:20px }
    table { width:100%; border-collapse: collapse; margin-top:20px }
    th, td { padding:10px; border-bottom:1px solid #444 }
    th { background:#222 }
    input, button { padding:8px; margin:5px }
  </style>
</head>
<body>
  <h1>Revenue Pipeline Command Center</h1>
  <h3 id="forecast"></h3>

  <table id="table">
    <thead>
      <tr>
        <th>Company</th>
        <th>Stage</th>
        <th>Deal Value</th>
        <th>Probability</th>
        <th>Weighted</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <h3>Add Deal</h3>
  <input id="company" placeholder="Company">
  <input id="stage" placeholder="Stage">
  <input id="value" type="number" placeholder="Value">
  <input id="prob" type="number" step="0.1" placeholder="Probability">
  <button onclick="addDeal()">Add</button>

<script>
async function load() {
  const res = await fetch("/api/deals");
  const deals = await res.json();
  let total = 0;
  const body = document.querySelector("tbody");
  body.innerHTML = "";
  deals.forEach(d => {
    const weighted = d.value * d.probability;
    total += weighted;
    body.innerHTML += `<tr>
      <td>${d.company}</td>
      <td>${d.stage}</td>
      <td>$${d.value.toLocaleString()}</td>
      <td>${d.probability}</td>
      <td>$${weighted.toLocaleString()}</td>
    </tr>`;
  });
  document.getElementById("forecast").innerText =
    "Weighted Forecast: $" + total.toLocaleString();
}

async function addDeal() {
  await fetch("/api/deals", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      company: company.value,
      stage: stage.value,
      value: Number(value.value),
      probability: Number(prob.value)
    })
  });
  load();
}

load();
</script>
</body>
</html>
