<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Division Breakdown - Tony CRM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
    }
    a { color: #00ff88; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .nav { margin-bottom: 1.5rem; display: flex; gap: 1rem; }
    h1 { color: #00ff88; font-size: 1.8rem; margin-bottom: 2rem; }
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .tab {
      padding: 0.6rem 1.2rem;
      background: #333;
      border: none;
      border-radius: 6px;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .tab.active { background: #00ff88; color: #0a0a0f; }
    .tab.scientific.active { background: #00aaff; color: #0a0a0f; }
    .tab.engineering.active { background: #ff6600; color: #fff; }
    .accounts { display: grid; gap: 1rem; }
    .account-card {
      background: #1a1a24;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .account-card:hover { border-color: #00ff88; }
    .account-info h3 { margin-bottom: 0.3rem; }
    .account-info h3 a { color: #e0e0e0; }
    .account-info h3 a:hover { color: #00ff88; }
    .account-meta { font-size: 0.85rem; color: #888; }
    .tier {
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .tier-A { background: #00ff88; color: #0a0a0f; }
    .tier-B { background: #ffd700; color: #0a0a0f; }
    .tier-C { background: #666; color: #fff; }
    .empty { text-align: center; padding: 2rem; color: #666; }
    .count { font-size: 0.85rem; color: #888; margin-left: 0.5rem; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="index.html">&larr; Accounts</a>
    <a href="dashboard.html">Dashboard</a>
  </div>
  <h1>Division Breakdown</h1>

  <div class="tabs">
    <button class="tab scientific active" data-division="Natoli Scientific">Scientific <span class="count" id="count-sci">0</span></button>
    <button class="tab engineering" data-division="Natoli Engineering">Engineering <span class="count" id="count-eng">0</span></button>
    <button class="tab" data-division="Both">Both <span class="count" id="count-both">0</span></button>
  </div>

  <div class="accounts" id="accounts">
    <div class="empty">Loading...</div>
  </div>

  <script>
    let allAccounts = [];

    async function load() {
      try {
        const res = await fetch('/api/accounts');
        const data = await res.json();
        allAccounts = data.accounts || [];

        document.getElementById('count-sci').textContent = allAccounts.filter(a => a.division_fit === 'Natoli Scientific').length;
        document.getElementById('count-eng').textContent = allAccounts.filter(a => a.division_fit === 'Natoli Engineering').length;
        document.getElementById('count-both').textContent = allAccounts.filter(a => a.division_fit === 'Both').length;

        filterAccounts('Natoli Scientific');
      } catch (e) {
        document.getElementById('accounts').innerHTML = '<div class="empty">Failed to load accounts.</div>';
      }
    }

    function filterAccounts(division) {
      const filtered = allAccounts.filter(a => a.division_fit === division);
      
      if (filtered.length === 0) {
        document.getElementById('accounts').innerHTML = '<div class="empty">No accounts in this division.</div>';
        return;
      }

      document.getElementById('accounts').innerHTML = filtered.map(a => `
        <div class="account-card">
          <div class="account-info">
            <h3><a href="account.html?id=${a.id}">${a.company_name}</a></h3>
            <div class="account-meta">${a.industry || 'Unknown'} | Score: ${a.persona_score || 0}</div>
          </div>
          <span class="tier tier-${a.tier}">${a.tier || '-'}</span>
        </div>
      `).join('');
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        filterAccounts(tab.dataset.division);
      });
    });

    load();
  </script>
</body>
</html>
