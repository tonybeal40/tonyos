<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Enterprise Resume Builder | TonyOS</title>

  <style>
    :root{
      --bg:#07070a;
      --panel:#0f1118;
      --panel2:#121521;
      --ink:#f5f7ff;
      --muted:#b8bfd6;
      --muted2:#8e97b3;
      --line:#23283a;

      --accent:#5eead4;
      --accent2:#60a5fa;
      --warn:#fbbf24;
      --good:#22c55e;

      --radius:18px;

      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:var(--font);
      color:var(--ink);
      background:
        radial-gradient(1100px 700px at 10% 0%, rgba(94,234,212,.15), transparent 55%),
        radial-gradient(900px 600px at 90% 10%, rgba(96,165,250,.14), transparent 55%),
        radial-gradient(700px 500px at 30% 90%, rgba(251,191,36,.08), transparent 60%),
        var(--bg);
    }

    header{
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(7,7,10,.70);
      backdrop-filter: blur(12px);
      border-bottom:1px solid var(--line);
    }

    .wrap{max-width:1240px; margin:0 auto; padding:18px;}
    .brand{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }
    .brand-left{display:flex; align-items:center; gap:14px;}
    .logo{
      width:40px; height:40px;
      border-radius:12px;
      background: linear-gradient(135deg, rgba(94,234,212,.25), rgba(96,165,250,.22));
      border:1px solid rgba(255,255,255,.10);
      box-shadow: 0 10px 22px rgba(0,0,0,.35);
      display:grid;
      place-items:center;
      font-weight:800;
      letter-spacing:.3px;
    }
    .titleBlock h1{
      margin:0;
      font-size:14px;
      letter-spacing:.25px;
      text-transform:uppercase;
      color: var(--muted);
    }
    .titleBlock .sub{
      margin-top:4px;
      font-size:13px;
      color:var(--muted2);
      line-height:1.35;
    }
    .statusPills{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .pill{
      font-size:12px;
      color:var(--muted);
      border:1px solid var(--line);
      border-radius:999px;
      padding:7px 10px;
      background: rgba(15,17,24,.55);
    }
    .pill.live{
      border-color: rgba(34,197,94,.35);
      background: rgba(34,197,94,.10);
      color: #c9f8d9;
    }

    main{padding: 18px;}
    .grid{
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap:14px;
      align-items:start;
    }
    @media (max-width: 980px){ .grid{grid-template-columns:1fr} header{position:relative} }

    .card{
      background: linear-gradient(180deg, rgba(18,21,33,.92), rgba(15,17,24,.92));
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 14px 30px rgba(0,0,0,.35);
      overflow:hidden;
    }
    .card-h{
      padding:14px 14px 10px 14px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .card-h strong{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      letter-spacing:.32px;
      text-transform:uppercase;
    }
    .card-b{padding:14px}

    label{
      display:block;
      color:var(--muted);
      font-size:12px;
      margin:12px 0 6px;
      letter-spacing:.15px;
    }
    input, textarea, select{
      width:100%;
      background: rgba(7,7,10,.55);
      border:1px solid rgba(35,40,58,.9);
      color:var(--ink);
      border-radius: 12px;
      padding:10px 10px;
      outline:none;
      font-size:13px;
      line-height:1.4;
    }
    textarea{min-height:86px; resize:vertical}
    select{appearance:none}

    .row{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }
    @media (max-width: 560px){ .row{grid-template-columns:1fr} }

    .btns{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:14px;
    }
    button{
      cursor:pointer;
      border:1px solid var(--line);
      background: rgba(7,7,10,.55);
      color:var(--ink);
      border-radius: 12px;
      padding:10px 12px;
      font-size:13px;
      font-weight:600;
      letter-spacing:.12px;
    }
    button.primary{
      border-color: rgba(94,234,212,.35);
      background: rgba(94,234,212,.12);
    }
    button.blue{
      border-color: rgba(96,165,250,.35);
      background: rgba(96,165,250,.12);
    }
    button.good{
      border-color: rgba(34,197,94,.35);
      background: rgba(34,197,94,.12);
    }
    button.warn{
      border-color: rgba(251,191,36,.35);
      background: rgba(251,191,36,.12);
    }

    .hint{
      margin-top:10px;
      color:var(--muted2);
      font-size:12px;
      line-height:1.45;
    }
    .toast{
      margin-top:10px;
      font-size:12px;
      color: var(--muted);
    }

    .tabs{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      padding:10px 14px;
      border-bottom:1px solid var(--line);
      background: rgba(7,7,10,.35);
    }
    .tab{
      border:1px solid var(--line);
      background: rgba(15,17,24,.55);
      color: var(--muted);
      border-radius:999px;
      padding:8px 10px;
      font-size:12px;
      cursor:pointer;
      user-select:none;
    }
    .tab.active{
      border-color: rgba(94,234,212,.35);
      color: #d8fffa;
      background: rgba(94,234,212,.10);
    }

    .mono{
      font-family: var(--mono);
      white-space: pre-wrap;
      word-break: break-word;
      font-size:12.5px;
      line-height:1.55;
      color: #e9edff;
    }

    .resumePage{
      background: #ffffff;
      color: #0b1020;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,.10);
      padding: 22px 24px;
      max-width: 820px;
      margin: 0 auto;
      box-shadow: 0 16px 30px rgba(0,0,0,.30);
      font-family: var(--font);
    }
    .rp-name{
      font-size: 22px;
      font-weight: 800;
      letter-spacing: .2px;
      margin: 0;
    }
    .rp-contact{
      margin-top: 6px;
      font-size: 12.5px;
      color: #1f2a44;
      opacity: .85;
    }
    .rp-headline{
      margin-top: 10px;
      font-size: 13.5px;
      font-weight: 700;
      color: #0b1020;
    }
    .rp-section{
      margin-top: 14px;
    }
    .rp-section h3{
      font-size: 12px;
      letter-spacing: .22px;
      text-transform: uppercase;
      margin: 0 0 8px 0;
      color: #0b1020;
      border-bottom: 1px solid rgba(11,16,32,.12);
      padding-bottom: 6px;
    }
    .rp-text{
      font-size: 12.8px;
      line-height: 1.55;
      color: #0b1020;
      opacity: .92;
      white-space: pre-wrap;
    }

    @media print{
      body{background:#fff}
      header, .noPrint{display:none !important}
      main{padding:0}
      .card{border:none; box-shadow:none; background:transparent}
      .resumePage{box-shadow:none; border:none; border-radius:0; margin:0; max-width:none}
    }
  </style>
</head>

<body>
  <header class="noPrint">
    <div class="wrap">
      <div class="brand">
        <div class="brand-left">
          <div class="logo">TB</div>
          <div class="titleBlock">
            <h1>Enterprise Resume Builder</h1>
            <div class="sub">Fortune-grade structure. ATS clean. PDF export. Built for executive credibility</div>
          </div>
        </div>
        <div class="statusPills">
          <span class="pill live" id="saveState">Saved</span>
          <span class="pill">ATS Output</span>
          <span class="pill">PDF Preview</span>
        </div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="grid">

      <section class="card noPrint">
        <div class="card-h">
          <strong>Candidate Profile</strong>
          <span class="pill">Executive ready</span>
        </div>
        <div class="card-b">
          <div class="row">
            <div>
              <label>Full Name</label>
              <input id="name" placeholder="Tony Beal" />
            </div>
            <div>
              <label>Target Role</label>
              <select id="targetRole">
                <option value="RevOps / Revenue Operations">RevOps / Revenue Operations</option>
                <option value="Business Development / Sales">Business Development / Sales</option>
                <option value="Go To Market / GTM">Go To Market / GTM</option>
                <option value="AI Enabled Growth / Ops">AI Enabled Growth / Ops</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div>
              <label>Location</label>
              <input id="location" placeholder="St. Louis, MO | Remote" />
            </div>
            <div>
              <label>LinkedIn</label>
              <input id="linkedin" placeholder="linkedin.com/in/yourhandle" />
            </div>
          </div>

          <div class="row">
            <div>
              <label>Email</label>
              <input id="email" placeholder="you@email.com" />
            </div>
            <div>
              <label>Phone</label>
              <input id="phone" placeholder="(555) 555-5555" />
            </div>
          </div>

          <label>Headline</label>
          <input id="headline" placeholder="Revenue Operations and Business Development | AI Powered Outbound | B2B Growth" />

          <label>Executive Summary</label>
          <textarea id="summary"></textarea>

          <label>Core Skills</label>
          <textarea id="skills"></textarea>

          <label>Achievements and Metrics</label>
          <textarea id="metrics"></textarea>

          <label>Experience</label>
          <textarea id="experience"></textarea>

          <label>Education</label>
          <textarea id="education"></textarea>

          <div class="btns">
            <button class="primary" id="generate">Generate</button>
            <button class="good" id="copy">Copy ATS Output</button>
            <button class="blue" id="downloadTxt">Download .txt</button>
            <button class="blue" id="exportPdf">Export PDF</button>
            <button id="reset">Reset</button>
          </div>

          <div class="toast" id="toast"></div>
        </div>
      </section>

      <section class="card">
        <div class="card-h">
          <strong>Output</strong>
          <span class="pill">Enterprise formatting</span>
        </div>

        <div class="tabs noPrint">
          <div class="tab active" id="tabATS">ATS Output</div>
          <div class="tab" id="tabPreview">PDF Preview</div>
        </div>

        <div class="card-b">
          <div id="atsView" class="mono"></div>

          <div id="previewView" style="display:none;">
            <div class="resumePage" id="resumePage">
              <div>
                <h2 class="rp-name" id="pName">Tony Beal</h2>
                <div class="rp-contact" id="pContact"></div>
                <div class="rp-headline" id="pHeadline"></div>
              </div>

              <div class="rp-section">
                <h3>Summary</h3>
                <div class="rp-text" id="pSummary"></div>
              </div>

              <div class="rp-section">
                <h3>Core Skills</h3>
                <div class="rp-text" id="pSkills"></div>
              </div>

              <div class="rp-section">
                <h3>Achievements</h3>
                <div class="rp-text" id="pMetrics"></div>
              </div>

              <div class="rp-section">
                <h3>Experience</h3>
                <div class="rp-text" id="pExperience"></div>
              </div>

              <div class="rp-section">
                <h3>Education</h3>
                <div class="rp-text" id="pEducation"></div>
              </div>
            </div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const STORAGE_KEY = "tony_enterprise_resume_builder_v1";

    const fields = [
      "name","targetRole","location","email","phone","linkedin",
      "headline","summary","skills","metrics","experience","education"
    ];

    function setToast(msg){
      $("toast").textContent = msg || "";
      if(msg) setTimeout(() => $("toast").textContent = "", 1800);
    }

    function setSavedBadge(state){
      const el = $("saveState");
      el.textContent = state;
      el.classList.toggle("live", state === "Saved");
    }

    function normalizeLines(text){
      return (text || "")
        .replace(/\r\n/g, "\n")
        .split("\n")
        .map(l => l.trimEnd())
        .join("\n")
        .trim();
    }

    function load(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return;
        const data = JSON.parse(raw);
        fields.forEach(f => {
          if(data[f] !== undefined) $(f).value = data[f];
        });
        setSavedBadge("Saved");
      }catch(e){}
    }

    function save(){
      const data = {};
      fields.forEach(f => data[f] = ($(f).value || ""));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      setSavedBadge("Saved");
    }

    function buildATS(){
      const name = normalizeLines($("name").value) || "Tony Beal";
      const role = normalizeLines($("targetRole").value);
      const location = normalizeLines($("location").value);
      const email = normalizeLines($("email").value);
      const phone = normalizeLines($("phone").value);
      const linkedin = normalizeLines($("linkedin").value);
      const headline = normalizeLines($("headline").value);
      const summary = normalizeLines($("summary").value);
      const skills = normalizeLines($("skills").value);
      const metrics = normalizeLines($("metrics").value);
      const experience = normalizeLines($("experience").value);
      const education = normalizeLines($("education").value);

      const contactParts = [location, phone, email, linkedin].filter(Boolean).join(" | ");

      const lines = [];
      lines.push(name.toUpperCase());
      if(role) lines.push(role);
      if(contactParts) lines.push(contactParts);
      lines.push("");

      if(headline){ lines.push("HEADLINE", headline, ""); }
      if(summary){ lines.push("SUMMARY", summary, ""); }
      if(skills){ lines.push("CORE SKILLS", skills, ""); }
      if(metrics){ lines.push("ACHIEVEMENTS", metrics, ""); }
      if(experience){ lines.push("EXPERIENCE", experience, ""); }
      if(education){ lines.push("EDUCATION", education, ""); }

      return lines.join("\n").trim() + "\n";
    }

    function buildPreview(){
      const name = normalizeLines($("name").value) || "Tony Beal";
      const location = normalizeLines($("location").value);
      const email = normalizeLines($("email").value);
      const phone = normalizeLines($("phone").value);
      const linkedin = normalizeLines($("linkedin").value);

      $("pName").textContent = name;
      $("pContact").textContent = [location, phone, email, linkedin].filter(Boolean).join(" | ");
      $("pHeadline").textContent = normalizeLines($("headline").value);
      $("pSummary").textContent = normalizeLines($("summary").value);
      $("pSkills").textContent = normalizeLines($("skills").value);
      $("pMetrics").textContent = normalizeLines($("metrics").value);
      $("pExperience").textContent = normalizeLines($("experience").value);
      $("pEducation").textContent = normalizeLines($("education").value);
    }

    function render(){
      $("atsView").textContent = buildATS();
      buildPreview();
    }

    // Tabs
    function setTab(which){
      const atsOn = which === "ats";
      $("tabATS").classList.toggle("active", atsOn);
      $("tabPreview").classList.toggle("active", !atsOn);
      $("atsView").style.display = atsOn ? "block" : "none";
      $("previewView").style.display = atsOn ? "none" : "block";
    }
    $("tabATS").addEventListener("click", () => setTab("ats"));
    $("tabPreview").addEventListener("click", () => setTab("preview"));

    // Auto save + render
    fields.forEach(f => {
      $(f).addEventListener("input", () => {
        setSavedBadge("Saving");
        save();
        render();
      });
      $(f).addEventListener("change", () => {
        setSavedBadge("Saving");
        save();
        render();
      });
    });

    $("generate").addEventListener("click", () => {
      save();
      render();
      setToast("Generated");
    });

    $("copy").addEventListener("click", async () => {
      try{
        await navigator.clipboard.writeText(buildATS());
        setToast("Copied");
      }catch(e){
        setToast("Copy blocked by browser");
      }
    });

    $("downloadTxt").addEventListener("click", () => {
      const text = buildATS();
      const blob = new Blob([text], {type:"text/plain;charset=utf-8"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "Tony_Beal_Resume_Enterprise.txt";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      setToast("Downloaded");
    });

    $("exportPdf").addEventListener("click", () => {
      setTab("preview");
      setTimeout(() => window.print(), 150);
    });

    $("reset").addEventListener("click", () => {
      if(!confirm("Reset everything? This clears saved data on this browser")) return;
      localStorage.removeItem(STORAGE_KEY);
      fields.forEach(f => $(f).value = "");
      render();
      setSavedBadge("Saved");
      setToast("Reset");
    });

    // Init
    load();
    render();
    setTab("ats");
  </script>
</body>
</html>
